name: Test Integrations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "opensoar-sdk @ git+https://github.com/opensoar-hq/opensoar-sdk.git"
      - run: pip install -e ".[dev]"
      - run: pytest
